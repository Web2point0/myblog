<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Watch Video</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px 16px;
            background: #111827;
            color: #f9fafb;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        video {
            display: block;
            width: 100%;
            max-height: 70vh;
            background: #000;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #description {
            color: #d1d5db;
            white-space: pre-wrap;
        }

        #details {
            margin-top: 12px;
            color: #9ca3af;
        }

        #message {
            padding: 18px;
            background: #1f2937;
            border-radius: 8px;
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>

<body>
    <main class="container">
        <div id="message">
            Loading video...
        </div>

        <section id="videoSection" hidden>
            <video
                id="videoPlayer"
                controls
                playsinline
                preload="metadata"
            ></video>

            <h1 id="videoTitle"></h1>

            <p id="description"></p>

            <div id="details"></div>
        </section>
    </main>

    <script src="javascript.js"></script>
</body>
</html>
