<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Popular Videos</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0f172a;
            color: #f8fafc;
            font-family:
                Arial,
                Helvetica,
                sans-serif;
        }

        a {
            color: inherit;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            padding: 18px 5%;

            background:
                rgba(15, 23, 42, 0.94);

            border-bottom:
                1px solid #334155;

            backdrop-filter:
                blur(10px);
        }

        .site-title {
            margin: 0;
            font-size: 1.4rem;
        }

        .upload-link {
            display: inline-block;
            padding: 10px 16px;

            color: #ffffff;
            text-decoration: none;

            background: #2563eb;
            border-radius: 8px;
        }

        .upload-link:hover {
            background: #1d4ed8;
        }

        .page-container {
            width: min(1200px, 92%);
            margin: 0 auto;
            padding: 38px 0 60px;
        }

        .page-heading {
            margin-bottom: 28px;
        }

        .page-heading h2 {
            margin: 0 0 8px;
            font-size: clamp(
                1.8rem,
                4vw,
                2.6rem
            );
        }

        .page-heading p {
            margin: 0;
            color: #94a3b8;
        }

        #statusMessage {
            padding: 20px;
            color: #cbd5e1;
            text-align: center;

            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
        }

        .video-grid {
            display: grid;

            grid-template-columns:
                repeat(
                    auto-fill,
                    minmax(260px, 1fr)
                );

            gap: 24px;
        }

        .video-card {
            overflow: hidden;
            min-width: 0;

            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;

            transition:
                transform 0.18s ease,
                border-color 0.18s ease;
        }

        .video-card:hover {
            transform: translateY(-4px);
            border-color: #64748b;
        }

        .thumbnail-link {
            position: relative;
            display: block;

            aspect-ratio: 16 / 9;
            overflow: hidden;

            color: inherit;
            text-decoration: none;

            background:
                linear-gradient(
                    135deg,
                    #1d4ed8,
                    #0f766e
                );
        }

        .thumbnail-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            height: 100%;

            padding: 20px;
            color: rgba(255, 255, 255, 0.88);
            font-weight: bold;
            text-align: center;
        }

        .duration-badge {
            position: absolute;
            right: 8px;
            bottom: 8px;

            padding: 4px 7px;

            color: #ffffff;
            font-size: 0.78rem;
            font-weight: bold;

            background: rgba(0, 0, 0, 0.8);
            border-radius: 5px;
        }

        .video-content {
            padding: 16px;
        }

        .video-title {
            margin: 0 0 9px;

            font-size: 1.05rem;
            line-height: 1.35;
        }

        .video-title a {
            text-decoration: none;
        }

        .video-title a:hover {
            text-decoration: underline;
        }

        .video-meta {
            margin-bottom: 10px;
            color: #94a3b8;
            font-size: 0.88rem;
        }

        .video-description {
            display: -webkit-box;
            overflow: hidden;

            margin: 0;
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.45;

            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;

            margin-top: 38px;
        }

        .pagination button {
            padding: 10px 16px;

            color: #ffffff;
            font-size: 0.95rem;

            background: #2563eb;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
        }

        .pagination button:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .pagination button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #pageIndicator {
            min-width: 120px;
            color: #cbd5e1;
            text-align: center;
        }

        [hidden] {
            display: none !important;
        }

        @media (max-width: 600px) {
            .site-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .upload-link {
                width: 100%;
                text-align: center;
            }

            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <h1 class="site-title">
            Popular Videos
        </h1>

        <a
            class="upload-link"
            href="/upload.html"
        >
            Upload a video
        </a>
    </header>

    <main class="page-container">
        <section class="page-heading">
            <h2>Most Viewed</h2>

            <p>
                Videos with at least 15 views,
                ranked from most viewed to least viewed.
            </p>
        </section>

        <div id="statusMessage">
            Loading popular videos...
        </div>

        <section
            id="videoGrid"
            class="video-grid"
            aria-live="polite"
            hidden
        ></section>

        <nav
            id="pagination"
            class="pagination"
            aria-label="Popular video pages"
            hidden
        >
            <button
                id="previousButton"
                type="button"
            >
                Previous
            </button>

            <span id="pageIndicator">
                Page 1 of 1
            </span>

            <button
                id="nextButton"
                type="button"
            >
                Next
            </button>
        </nav>
    </main>

    <script src="home-script.js"></script>
</body>
</html>
