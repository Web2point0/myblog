<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta
        name="robots"
        content="noindex, nofollow"
    >

    <title>Video Administration</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;

            color: #f8fafc;
            background: #0f172a;

            font-family:
                Arial,
                Helvetica,
                sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        [hidden] {
            display: none !important;
        }

        .page-container {
            width: min(1200px, 94%);
            margin: 0 auto;
            padding: 32px 0 60px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            margin-bottom: 28px;
        }

        .admin-header h1 {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.5rem);
        }

        .admin-header p {
            margin: 6px 0 0;
            color: #94a3b8;
        }

        .panel {
            padding: 24px;

            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
        }

        .login-panel {
            width: min(460px, 100%);
            margin: 80px auto 0;
        }

        .login-panel h2 {
            margin-top: 0;
        }

        .login-form {
            display: grid;
            gap: 14px;
        }

        .login-form label {
            font-weight: bold;
        }

        .login-form input {
            width: 100%;
            padding: 12px 14px;

            color: #f8fafc;
            background: #0f172a;

            border: 1px solid #475569;
            border-radius: 8px;
        }

        .login-form input:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        .primary-button,
        .secondary-button,
        .permanent-button,
        .normal-button {
            padding: 10px 15px;

            color: #ffffff;
            border: 0;
            border-radius: 8px;
        }

        .primary-button {
            background: #2563eb;
        }

        .primary-button:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .secondary-button {
            background: #475569;
        }

        .secondary-button:hover:not(:disabled) {
            background: #64748b;
        }

        .permanent-button {
            background: #047857;
        }

        .permanent-button:hover:not(:disabled) {
            background: #065f46;
        }

        .normal-button {
            background: #b45309;
        }

        .normal-button:hover:not(:disabled) {
            background: #92400e;
        }

        button:disabled {
            opacity: 0.55;
            cursor: wait;
        }

        .message {
            margin-top: 14px;
            padding: 12px 14px;

            color: #cbd5e1;
            background: #0f172a;

            border: 1px solid #334155;
            border-radius: 8px;
        }

        .message.error {
            color: #fecaca;
            border-color: #991b1b;
            background: #450a0a;
        }

        .message.success {
            color: #bbf7d0;
            border-color: #166534;
            background: #052e16;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;

            margin-bottom: 22px;
        }

        .toolbar h2 {
            margin: 0;
        }

        .video-list {
            display: grid;
            gap: 18px;
        }

        .video-card {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            overflow: hidden;

            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
        }

        .thumbnail-container {
            position: relative;
            min-height: 150px;

            background:
                linear-gradient(
                    135deg,
                    #1d4ed8,
                    #0f766e
                );
        }

        .thumbnail-container img {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 150px;
            object-fit: cover;
        }

        .thumbnail-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            height: 100%;
            min-height: 150px;

            padding: 20px;
            font-weight: bold;
            text-align: center;
        }

        .video-content {
            min-width: 0;
            padding: 18px;
        }

        .video-content h3 {
            margin: 0 0 8px;
        }

        .video-content h3 a {
            color: #f8fafc;
            text-decoration: none;
        }

        .video-content h3 a:hover {
            text-decoration: underline;
        }

        .description {
            margin: 10px 0;
            color: #cbd5e1;
            line-height: 1.45;
        }

        .metadata {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;

            margin: 12px 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .status-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;

            margin: 12px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 9px;

            font-size: 0.8rem;
            font-weight: bold;

            background: #334155;
            border-radius: 999px;
        }

        .status-badge.permanent {
            color: #bbf7d0;
            background: #14532d;
        }

        .status-badge.expiring {
            color: #fde68a;
            background: #78350f;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

            margin-top: 16px;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;

            margin-top: 30px;
        }

        .pagination span {
            min-width: 120px;
            text-align: center;
        }

        @media (max-width: 760px) {
            .admin-header,
            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .video-card {
                grid-template-columns: 1fr;
            }

            .thumbnail-container {
                aspect-ratio: 16 / 9;
            }
        }
        .delete-button {
    padding: 10px 15px;

    color: #ffffff;
    background: #b91c1c;

    border: 0;
    border-radius: 8px;
}

.delete-button:hover:not(:disabled) {
    background: #991b1b;
}
    </style>
</head>

<body>
    <main class="page-container">
        <section
            id="loginSection"
            class="panel login-panel"
        >
            <h2>Administrator Login</h2>

            <p>
                Enter the administrator password to manage
                video expiration.
            </p>

            <form
                id="loginForm"
                class="login-form"
            >
                <label for="passwordInput">
                    Password
                </label>

                <input
                    id="passwordInput"
                    name="password"
                    type="password"
                    required
                    autocomplete="current-password"
                >

                <button
                    id="loginButton"
                    class="primary-button"
                    type="submit"
                >
                    Sign in
                </button>
            </form>

            <div
                id="loginMessage"
                class="message"
                hidden
            ></div>
        </section>

        <section
            id="adminSection"
            hidden
        >
            <header class="admin-header">
                <div>
                    <h1>Video Administration</h1>

                    <p>
                        Manage permanent and normally expiring videos.
                    </p>
                </div>

                <button
                    id="logoutButton"
                    class="secondary-button"
                    type="button"
                >
                    Log out
                </button>
            </header>

            <div class="toolbar">
                <h2>Uploaded Videos</h2>

                <button
                    id="refreshButton"
                    class="secondary-button"
                    type="button"
                >
                    Refresh
                </button>
            </div>

            <div
                id="adminMessage"
                class="message"
            >
                Loading videos...
            </div>

            <section
                id="videoList"
                class="video-list"
                aria-live="polite"
                hidden
            ></section>

            <nav
                id="pagination"
                class="pagination"
                aria-label="Admin video pages"
                hidden
            >
                <button
                    id="previousButton"
                    class="secondary-button"
                    type="button"
                >
                    Previous
                </button>

                <span id="pageIndicator">
                    Page 1 of 1
                </span>

                <button
                    id="nextButton"
                    class="secondary-button"
                    type="button"
                >
                    Next
                </button>
            </nav>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
