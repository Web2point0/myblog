<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Video</title>

<style>

body {

    font-family: Arial, sans-serif;

    background:#f4f7fb;

    padding:40px;

}


.container {

    max-width:600px;

    margin:auto;

    background:white;

    padding:30px;

    border-radius:12px;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

}


input,
textarea,
button {

    width:100%;

    margin-top:15px;

    padding:12px;

    font-size:16px;

}


textarea {

    height:120px;

}


button {

    background:#0066ff;

    color:white;

    border:none;

    border-radius:6px;

    cursor:pointer;

}


button:hover {

    background:#004ecc;

}


.progress {

    margin-top:20px;

}


progress {

    width:100%;

    height:25px;

}


#status {

    margin-top:15px;

    font-weight:bold;

}


</style>

</head>


<body>


<div class="container">


<h2>
Upload Video
</h2>


<label>
Video File
</label>


<input
type="file"
id="videoFile"
accept="video/*"
>



<input
id="title"
placeholder="Video title"
>



<textarea
id="description"
placeholder="Video description">
</textarea>



<button id="uploadBtn">

Upload Video

</button>



<div class="progress">


<progress
id="progressBar"
value="0"
max="100">
</progress>


</div>


<div id="status"></div>


</div>



<script src="script.js"></script>


</body>

</html>
